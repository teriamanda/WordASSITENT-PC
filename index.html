<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google 翻译 - 记忆强化版</title>
    <style>
        body { font-family: 'Google Sans', Roboto, Arial, sans-serif; margin: 0; background: #fff; color: #3c4043; height: 100vh; overflow: hidden; }
        .g-header { display: flex; align-items: center; padding: 12px 24px; border-bottom: 1px solid #dadce0; height: 48px; }
        .g-logo { color: #5f6368; font-size: 22px; display: flex; align-items: center; gap: 8px; }
        .g-tabs { display: flex; padding: 8px 24px; gap: 8px; border-bottom: 1px solid #dadce0; height: 40px; }
        .g-tab { display: flex; align-items: center; gap: 8px; padding: 0 16px; border-radius: 4px; border: 1px solid #dadce0; font-size: 14px; font-weight: 500; color: #1a73e8; background: #fff; cursor: pointer; }
        .g-tab.active { background: #e8f0fe; border-color: transparent; }
        
        .main-container { display: flex; flex-direction: column; max-width: 1280px; margin: 0 auto; padding: 15px; height: calc(100vh - 120px); }
        .translate-box { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #dadce0; border-radius: 8px; min-height: 220px; box-shadow: 0 1px 2px 0 rgba(60,64,67,.3); background: #fff; }
        
        .source-side { padding: 16px; border-right: 1px solid #dadce0; display: flex; flex-direction: column; position: relative; }
        .target-side { padding: 16px; background: #f8f9fa; border-radius: 0 8px 8px 0; display: flex; flex-direction: column; }
        
        .lang-select { font-size: 14px; font-weight: 500; color: #1a73e8; margin-bottom: 12px; display: flex; justify-content: space-between; }
        #source-content { font-size: 22px; line-height: 1.4; flex: 1; min-height: 80px; }
        #spell-input { margin-top: 10px; border: none; border-bottom: 2px solid #1a73e8; font-size: 20px; width: 100%; outline: none; background: transparent; }
        
        #feedback-toast { color: #34a853; font-weight: bold; font-size: 14px; margin-top: 8px; opacity: 0; transition: 0.3s; }
        
        #target-content { font-size: 22px; color: #3c4043; cursor: pointer; }
        #target-content.blur { filter: blur(15px); } 
        .phonetic { color: #5f6368; font-size: 14px; margin-top: 12px; }

        .footer-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .nav-controls { display: flex; gap: 15px; align-items: center; color: #5f6368; }
        .nav-icon { cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 11px; gap: 4px; }
        .nav-icon svg { width: 20px; height: 20px; fill: currentColor; }
        .nav-icon:hover { color: #1a73e8; }

        .btn-group { display: flex; gap: 8px; }
        .g-btn { background: #1a73e8; color: white; border: none; padding: 8px 18px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; }
        .g-btn-sec { background:#f8f9fa; border:1px solid #dadce0; color:#5f6368; padding: 8px 18px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; }
        #slay-btn { background: none; border: none; color: #70757a; font-size: 12px; cursor: pointer; text-decoration: underline; }

        .log-section { margin-top: 20px; border-top: 1px solid #dadce0; padding-top: 10px; flex: 1; overflow-y: auto; }
        .log-item { display: flex; gap: 15px; border-bottom: 1px solid #f1f3f4; padding: 4px 0; font-size: 12px; align-items: baseline; }
        .log-time { color: #9aa0a6; min-width: 130px; font-family: monospace; }

        #sync-layer { display: none; position: fixed; inset: 0; background: white; z-index: 1000; flex-direction: column; padding: 30px; }
        .config-header { display: flex; justify-content: space-between; align-items: center; }
        .import-table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        .import-table th { background: #f8f9fa; text-align: left; padding: 10px; border: 1px solid #dadce0; font-size: 14px; }
        .import-table td { padding: 0; border: 1px solid #dadce0; }
        .import-table textarea { width: 100%; height: 300px; border: none; padding: 15px; box-sizing: border-box; font-family: monospace; resize: none; outline: none; }
        
        .blank-hint { color: #1a73e8; font-weight: bold; border-bottom: 2px solid #1a73e8; }
        .correct-word { color: #d93025; font-weight: bold; border-bottom: 2px solid #d93025; }
    </style>
</head>
<body>

<div class="g-header">
    <div class="g-logo"><span>Google</span> 翻译</div>
</div>

<div class="g-tabs">
    <button class="g-tab active">文本</button>
    <button class="g-tab" onclick="toggleSync()">词库管理</button>
</div>

<div class="main-container">
    <div class="translate-box">
        <div class="source-side">
            <div class="lang-select">检测语言 <span id="mastery-info"></span></div>
            <div id="source-content">加载中...</div>
            <input type="text" id="spell-input" placeholder="输入拼写..." autocomplete="off" onkeydown="checkKey(event)">
            <div id="feedback-toast">非常棒！🌟</div>
        </div>
        <div class="target-side">
            <div class="lang-select">中文 (简体)</div>
            <div id="target-content" onclick="manualReveal()"></div>
            <div class="phonetic" id="extra-sentence"></div>
        </div>
    </div>

    <div class="footer-tools">
        <div class="nav-controls">
            <div class="nav-icon" onclick="prevHistory()" title="历史记录 (上一条)">
                <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                <span>上一条</span>
            </div>
            <div class="nav-icon" onclick="next()" title="继续学习 (下一条)">
                <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
                <span>下一条</span>
            </div>
            <button id="slay-btn" onclick="handleFeedback('slay')">Slay (完全记住)</button>
        </div>

        <div class="btn-group">
            <button class="g-btn-sec" onclick="handleFeedback('forget')">不认识</button>
            <button class="g-btn-sec" onclick="handleFeedback('vague')">模糊</button>
            <button class="g-btn" style="background:#34a853;" onclick="handleFeedback('know')">认识 / Know & Skip</button>
        </div>
        <button class="g-btn" id="next-action-btn" onclick="next()" style="display:none; background:#5f6368;">下一条 ▶</button>
    </div>

    <div class="log-section">
        <div id="slay-log"></div>
    </div>
</div>

<div id="sync-layer">
    <div class="config-header">
        <h2>导入词库（粘贴表格数据）</h2>
        <button class="g-btn" onclick="saveData()">保存并开始复习</button>
    </div>
    <table class="import-table">
        <thead>
            <tr>
                <th>单词 (Word)</th>
                <th>释义 (Mean)</th>
                <th>例句 (Sentence)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="3">
                    <textarea id="data-in" placeholder="直接从 Excel 或表格中复制三列粘贴到这里..."></textarea>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const INTERVALS = [0, 5, 30, 720, 1440, 2880, 5760, 10080, 21600];
    let db = { lexicon: [], memory: {}, slayLog: [] };
    let currentWord = null;
    let isReviewing = false;
    let currentMode = 'spell'; 
    let historyStack = [];
    let historyPointer = -1;

    window.onload = () => {
        const saved = localStorage.getItem('stealth_google_v3_ebing_final');
        if(saved) {
            db = JSON.parse(saved);
            if(db.lexicon.length > 0) next();
            renderSlayLog();
        } else { toggleSync(); }
    };

    function toggleSync() {
        const s = document.getElementById('sync-layer');
        s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveData() {
        const raw = document.getElementById('data-in').value.trim();
        if(!raw) return toggleSync();
        raw.split(/\n/).forEach(line => {
            const parts = line.split(/\t/);
            if(parts[0]) {
                const w = parts[0].trim();
                let existing = db.lexicon.find(x => x.w === w);
                if(existing) {
                    existing.m = (parts[1] || "").trim();
                    existing.s = (parts[2] || "").trim();
                } else {
                    db.lexicon.push({ w: w, m: (parts[1] || "").trim(), s: (parts[2] || "").trim() });
                    db.memory[w] = { stage: 0, nextTime: Date.now(), mastered: false };
                }
            }
        });
        save(); toggleSync(); next();
    }

    function next() {
        // 逻辑 1：如果在历史记录中，点击“下一条”先往后翻历史
        if (historyPointer < historyStack.length - 1) {
            historyPointer++;
            currentWord = historyStack[historyPointer];
            renderCurrent();
            return;
        }

        // 逻辑 2：生成新词或到期复习词
        isReviewing = false;
        document.getElementById('next-action-btn').style.display = "none";
        document.querySelector('.btn-group').style.display = "flex";
        document.getElementById('feedback-toast').style.opacity = "0";
        
        const now = Date.now();
        const pool = db.lexicon.filter(x => !db.memory[x.w]?.mastered);
        
        if(pool.length === 0) {
            document.getElementById('source-content').innerText = "🎉 词库已清空！请导入更多词汇。";
            return;
        }

        // 逻辑 3：随机化推送算法
        // 筛选到期需要复习的词
        let duePool = pool.filter(x => db.memory[x.w].stage > 0 && db.memory[x.w].nextTime <= now);
        // 筛选从未学习的新词
        let newPool = pool.filter(x => db.memory[x.w].stage === 0);
        
        let selected;
        let activePool = duePool.concat(newPool);
        
        if (activePool.length > 0) {
            // 从活跃池（复习+新词）中随机抽取
            selected = activePool[Math.floor(Math.random() * activePool.length)];
        } else {
            // 如果都没有，随机抽取最近 10 个即将到期的单词中的一个，增加随机性
            const sortedPool = pool.sort((a, b) => db.memory[a.w].nextTime - db.memory[b.w].nextTime);
            const nearFuturePool = sortedPool.slice(0, 10);
            selected = nearFuturePool[Math.floor(Math.random() * nearFuturePool.length)];
        }

        currentWord = selected;
        historyStack.push(selected);
        historyPointer = historyStack.length - 1;
        renderCurrent();
    }

    function prevHistory() { 
        if (historyPointer > 0) { 
            historyPointer--; 
            currentWord = historyStack[historyPointer]; 
            renderCurrent(); 
        } 
    }

    function renderCurrent() {
        const sourceEl = document.getElementById('source-content');
        const targetEl = document.getElementById('target-content');
        const inputEl = document.getElementById('spell-input');
        const extraEl = document.getElementById('extra-sentence');
        const masteryEl = document.getElementById('mastery-info');

        const wordRegex = new RegExp(`\\b${currentWord.w}\\b`, 'i');
        
        if (currentWord.s && currentWord.s.trim() !== "") {
            currentMode = 'spell';
            inputEl.style.display = "block";
            targetEl.classList.remove('blur'); // 翻译默认显示
            
            if (wordRegex.test(currentWord.s)) {
                sourceEl.innerHTML = currentWord.s.replace(wordRegex, m => `<span class="blank-hint">${m.substring(0, 3)}${'_'.repeat(m.length-3)}</span>`);
            } else {
                sourceEl.innerText = currentWord.s;
            }
        } else {
            currentMode = 'read';
            inputEl.style.display = "none";
            sourceEl.innerText = currentWord.w;
            targetEl.classList.add('blur'); 
        }

        extraEl.innerText = ""; 
        inputEl.value = "";
        if(currentMode === 'spell') inputEl.focus();

        let stage = db.memory[currentWord.w].stage;
        let dots = "";
        for(let i=1; i<=8; i++) dots += i <= stage ? "●" : "○";
        masteryEl.innerText = (db.memory[currentWord.w].nextTime <= Date.now() ? "⌛" : "⏩") + dots;
        targetEl.innerText = currentWord.m;
    }

    function handleFeedback(type) {
        let mem = db.memory[currentWord.w];
        const now = Date.now();
        if(type === 'know') { 
            mem.stage = Math.min(mem.stage + 1, INTERVALS.length - 1);
            mem.nextTime = now + INTERVALS[mem.stage] * 60000;
            if(mem.stage >= 8) mem.mastered = true;
            next(); 
        } else if(type === 'slay') {
            mem.mastered = true;
            db.slayLog.unshift({ w: currentWord.w, m: currentWord.m, t: new Date().toLocaleString() });
            renderSlayLog();
            next();
        } else {
            // 不认识或模糊，重置阶段并缩短下一次出现时间
            mem.stage = 1;
            mem.nextTime = now + INTERVALS[1] * 60000;
            reveal(); 
        }
        save();
    }

    function reveal() {
        isReviewing = true;
        const sourceEl = document.getElementById('source-content');
        const wordRegex = new RegExp(`\\b${currentWord.w}\\b`, 'i');
        
        if (currentMode === 'spell') {
            if (currentWord.s && wordRegex.test(currentWord.s)) {
                sourceEl.innerHTML = currentWord.s.replace(wordRegex, m => `<span class="correct-word">${m}</span>`);
            } else {
                sourceEl.innerHTML = (currentWord.s || "") + `<br><span class="correct-word">${currentWord.w}</span>`;
            }
        }
        
        document.getElementById('target-content').classList.remove('blur');
        document.querySelector('.btn-group').style.display = "none";
        document.getElementById('next-action-btn').style.display = "block";
    }

    function checkKey(e) {
        if(e.key === 'Enter') {
            if(isReviewing) next();
            else if(currentMode === 'spell') {
                if(document.getElementById('spell-input').value.trim().toLowerCase() === currentWord.w.toLowerCase()) {
                    document.getElementById('feedback-toast').style.opacity = "1";
                    setTimeout(() => handleFeedback('know'), 400);
                } else reveal();
            }
        }
    }

    function manualReveal() { 
        if(currentMode === 'read') document.getElementById('target-content').classList.remove('blur'); 
    }
    
    function renderSlayLog() { 
        document.getElementById('slay-log').innerHTML = db.slayLog.slice(0, 15).map(i => `<div class="log-item"><span class="log-time">${i.t}</span><span class="log-word"><b>${i.w}</b></span><span>${i.m}</span></div>`).join(''); 
    }
    
    function save() { 
        localStorage.setItem('stealth_google_v3_ebing_final', JSON.stringify(db)); 
    }
</script>
</body>
</html>
